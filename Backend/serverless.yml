service: mern-project-interview-backend

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  memorySize: 128
  timeout: 10
  logRetentionInDays: 7

  httpApi:
    cors: true

  environment:
    STAGE: ${sls:stage}
    USERS_TABLE: ${self:service}-users-${sls:stage}
    CACHE_TTL_SECONDS: ${env:CACHE_TTL_SECONDS, '60'}
    REDIS_URL: ${env:REDIS_URL, ''}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt:
                - UsersTable
                - Arn

functions:
  app:
    handler: handler.handler
    events:
      - httpApi:
          path: /
          method: get
      - httpApi:
          path: /{proxy+}
          method: any

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH